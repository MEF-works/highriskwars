<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00FFFF" />
    <title>High Risk Wars</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="particle-canvas"></canvas>
    <div id="app">
      <div id="header">
        <div class="title">High Risk Wars</div>
        <div class="stats">
          <div class="stat">Day: <span id="stat-day">1</span></div>
          <div class="stat">Funds: $<span id="stat-money">0</span></div>
        </div>
      </div>
      <div id="main">
        <div id="actions">
          <h2>Actions</h2>
          <!-- Buttons will be generated by script -->
        </div>
        <div id="dashboard">
          <h2>Dashboard</h2>
          <div class="stats-grid" id="stats-grid">
            <!-- Stat cards generated via script -->
          </div>
          <h2 style="margin-top:1.5rem;">Achievements</h2>
          <ul class="achievement-list" id="achievement-list"></ul>
        </div>
      </div>
    </div>
    <!-- Start package selection overlay (shown on first load) -->
    <div id="start-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:20;">
      <div style="background-color:var(--surface-color); border:2px solid var(--primary-color); border-radius:var(--border-radius); padding:1rem; max-width:600px; width:90%; box-shadow:0 0 20px rgba(0,255,255,0.5), 0 0 10px rgba(255,0,255,0.3);">
        <h3 style="margin-top:0; color:var(--secondary-color);">Choose Your Starting Package</h3>
        <p style="color:var(--muted-color); font-size:0.9rem;">Pick how you want to begin your journey into high‑risk commerce. Each option comes with different resources and challenges.</p>
        <div id="start-options" style="display:flex; flex-direction:column; gap:0.5rem;"></div>
      </div>
    </div>
    <!-- Modal for random events -->
    <div id="modal-overlay">
      <div id="modal">
        <h3 id="modal-title">Event Title</h3>
        <p id="modal-description">Event description goes here.</p>
        <div class="choices" id="modal-choices"></div>
      </div>
    </div>
    <!-- Game logic and PWA registration -->
    <script src="script.js"></script>
  </body>
</html>

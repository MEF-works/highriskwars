<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline – High Risk Wars</title>
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0d0d1a;
        color: #fff;
        font-family: sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 500px;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        color: #00ffff;
      }
      p {
        font-size: 1rem;
        line-height: 1.5;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're Offline</h1>
      <p>
        It looks like you don't have an internet connection right now. High Risk
        Wars is a progressive web app and can still be played offline if you've
        visited before. Please reconnect to continue playing or refresh once
        you're back online.
      </p>
    </div>
  </body>
</html>
